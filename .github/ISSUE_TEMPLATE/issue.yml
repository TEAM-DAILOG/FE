name: "📋 이슈 생성"
description: "이슈 생성 시 브랜치가 자동으로 만들어집니다"
title: " "
body:
  - type: dropdown
    id: branchType
    attributes:
      label: "🌿 브랜치 유형"
      options:
        - feature
        - fix
        - refactor
    validations:
      required: true

  - type: input
    id: branch
    attributes:
      label: "🌳 브랜치에 포함될 작업 내용"
      description: "영어로만 작성 (한글 X)"
      placeholder: "login-ui"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "📌 상세 설명"
      description: "구현할 기능이나 작업 내용을 작성하세요"
      value: |
        - 구현할 내용 1
        - 구현할 내용 2
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업한 내용"
      description: "완료된 작업을 체크하며 진행하세요"
      value: |
        - [ ] 구현할 내용 1
        - [ ] 구현할 내용 2
    validations:
      required: false
